name: CI

on:
  # Pushes give pre-PR feedback on any branch. PRs re-run against the
  # merge-with-base so an out-of-date branch can't sneak in a broken merge.
  # Concurrency group cancels superseded runs on the same ref so the
  # push + PR-sync double trigger doesn't double-bill.
  push:
    branches-ignore:
      - 'gh-pages'
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build & Test (V20, net48)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-v20-${{ hashFiles('**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-v20-

      # Hosted runners have no TIA Portal install, so the real Siemens.Engineering
      # references can't resolve. UseSiemensStubs=true swaps in clean-room API
      # stubs under ci/stubs/ — compile + test only; the stub DLL must never ship.
      - name: Restore
        run: dotnet restore BlockParam.sln -p:UseSiemensStubs=true

      - name: Build (Release)
        run: dotnet build BlockParam.sln -c Release --no-restore -p:UseSiemensStubs=true

      - name: Test
        run: dotnet test src/BlockParam.Tests/BlockParam.Tests.csproj -c Release --no-build -p:UseSiemensStubs=true --logger "trx;LogFileName=test-results.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: '**/TestResults/*.trx'
