name: Screenshots

# Triggers:
#  - pull_request:    auto-run when UI-touching files change (path filter)
#  - push:            opt-in via "[run-shots]" anywhere in the HEAD commit message
#  - workflow_dispatch: manual button on any branch
#
# Produces hero shots + search-filter MP4 only — the slow narrated workflow
# video lives in workflow-video.yml so the cheap pipeline isn't held hostage
# by the expensive one.
on:
  pull_request:
    branches: [main]
    paths:
      - 'src/BlockParam/**'
      - 'src/BlockParam.DevLauncher/**'
      - 'assets/screenshots/scripts/**'
      - 'ci/stubs/**'
      - '.github/workflows/screenshots.yml'
  push:
  workflow_dispatch:

concurrency:
  group: screenshots-${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  capture:
    name: Hero shots + search-filter MP4
    runs-on: windows-latest
    if: |
      github.event_name != 'push' ||
      contains(github.event.head_commit.message, '[run-shots]')
    # Build uses Siemens stubs; DevLauncher capture reads DB XML from disk,
    # so no real Openness call is invoked at runtime.
    env:
      UseSiemensStubs: 'true'

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-screens-${{ hashFiles('**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-screens-

      - name: Build DevLauncher (Debug)
        # The capture scripts hardcode the Debug bin path
        # (src/BlockParam.DevLauncher/bin/Debug/net48/), so don't switch
        # to Release here without also updating every script.
        run: dotnet build src/BlockParam.DevLauncher -c Debug

      - name: Verify ffmpeg
        run: ffmpeg -version

      - name: Render search-filter frames + stitch
        shell: bash
        run: |
          src/BlockParam.DevLauncher/bin/Debug/net48/BlockParam.DevLauncher.exe \
            --capture-script assets/screenshots/scripts/search_gif.json
          bash assets/screenshots/scripts/build_search_gif.sh

      - name: Build website hero shots
        # build_website_shots.sh crops the bulk + inline tiles from the
        # workflow_inline.mp4 source PNGs that are committed to the repo.
        # We do NOT regenerate those frames here — that's the workflow-video
        # pipeline's job. The rules tile is captured live by
        # DevLauncher --capture-rules so it always reflects current UI.
        shell: bash
        run: bash assets/screenshots/scripts/build_website_shots.sh

      - name: Upload screenshots artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: |
            web/assets/workflow_bulk.png
            web/assets/workflow_inline.png
            web/assets/workflow_rules.png
            assets/screenshots/search/search_filter.mp4
            assets/screenshots/search/gif_search_*.png
          if-no-files-found: warn
          retention-days: 14
