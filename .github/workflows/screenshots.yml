name: Screenshots

# Generates marketing artifacts (website shots, workflow video, search MP4)
# from DevLauncher --capture and uploads them. No diffing, no commits — the
# review surface is "download the artifact and eyeball the PR's UI output".
#
# Only runs when files that could change visuals are touched, otherwise
# the runtime cost (build DevLauncher + 3 ffmpeg pipelines, ~5-10 min) is
# pure waste.
on:
  pull_request:
    paths:
      - 'src/BlockParam/**'
      - 'src/BlockParam.DevLauncher/**'
      - 'assets/screenshots/scripts/**'
      - 'ci/stubs/**'
      - '.github/workflows/screenshots.yml'
  workflow_dispatch:

concurrency:
  group: screenshots-${{ github.ref }}
  cancel-in-progress: true

jobs:
  capture:
    name: Capture screenshots + videos
    runs-on: windows-latest
    # The build itself uses Siemens stubs (no TIA Portal on hosted runner);
    # DevLauncher's capture path reads DB XML from disk, so no real Openness
    # call is ever invoked at runtime.
    env:
      UseSiemensStubs: 'true'

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-screens-${{ hashFiles('**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-screens-

      - name: Build DevLauncher (Debug)
        # The capture scripts hardcode the Debug bin path
        # (src/BlockParam.DevLauncher/bin/Debug/net48/), so don't switch
        # to Release here without also updating every script.
        run: dotnet build src/BlockParam.DevLauncher -c Debug

      - name: Verify ffmpeg
        run: ffmpeg -version

      - name: Render workflow video frames + stitch
        shell: bash
        run: |
          src/BlockParam.DevLauncher/bin/Debug/net48/BlockParam.DevLauncher.exe \
            --capture-script assets/screenshots/scripts/workflow_inline.json
          bash assets/screenshots/scripts/build_workflow_video.sh

      - name: Render search-filter frames + stitch
        shell: bash
        run: |
          src/BlockParam.DevLauncher/bin/Debug/net48/BlockParam.DevLauncher.exe \
            --capture-script assets/screenshots/scripts/search_gif.json
          bash assets/screenshots/scripts/build_search_gif.sh

      - name: Build website hero shots
        shell: bash
        run: bash assets/screenshots/scripts/build_website_shots.sh

      - name: Upload screenshots artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          # Everything the pipelines emit. Keep the structure so reviewers
          # can compare side-by-side with the committed assets/ tree.
          path: |
            web/assets/workflow_bulk.png
            web/assets/workflow_inline.png
            web/assets/workflow_rules.png
            assets/screenshots/workflow/workflow_inline.mp4
            assets/screenshots/search/search_filter.mp4
            assets/screenshots/workflow/wf*.png
            assets/screenshots/search/gif_search_*.png
          if-no-files-found: warn
          retention-days: 14
