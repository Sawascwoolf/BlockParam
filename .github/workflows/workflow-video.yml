name: Workflow video (manual)

# Slow narrated workflow MP4 rebuild — same pipeline the local
# `recreate-workflow-video` skill runs. Manual only because the workflow
# video is a marketing asset that changes deliberately, not on every UI
# tweak. Auto-running on PRs would burn ~5 min/run for output you'd
# usually discard.
on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch or commit SHA to capture from (defaults to the branch this workflow is launched on).'
        required: false
        type: string

concurrency:
  group: workflow-video-${{ github.event.inputs.ref || github.ref }}
  cancel-in-progress: false

jobs:
  capture:
    name: Build workflow video
    runs-on: windows-latest
    env:
      UseSiemensStubs: 'true'

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-video-${{ hashFiles('**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-video-

      - name: Build DevLauncher (Debug)
        run: dotnet build src/BlockParam.DevLauncher -c Debug

      - name: Verify ffmpeg
        run: ffmpeg -version

      - name: Render workflow frames + stitch MP4
        shell: bash
        run: |
          src/BlockParam.DevLauncher/bin/Debug/net48/BlockParam.DevLauncher.exe \
            --capture-script assets/screenshots/scripts/workflow_inline.json
          bash assets/screenshots/scripts/build_workflow_video.sh

      - name: Upload workflow video artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: workflow-video
          # The MP4 is the headline output; ship the source frames alongside
          # because build_website_shots.sh crops `workflow_bulk` + `workflow_inline`
          # from them — if you're regenerating the video you'll usually want the
          # frames committed too.
          path: |
            assets/screenshots/workflow/workflow_inline.mp4
            assets/screenshots/workflow/wf*.png
            assets/screenshots/workflow/ws_*.png
          if-no-files-found: warn
          retention-days: 30
