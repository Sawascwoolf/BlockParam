<?xml version="1.0" encoding="UTF-8"?>
<!--
  External-scene template (1920x1080 base @ 2x DPI = 3840x2160 PNG).

  Mirrors the BlockParam dialog's CursorOverlay (BulkChangeDialog.xaml @
  CursorOverlay) so a TIA painpoint screenshot composited via this template
  reads identical to a BlockParam dialog snapshot — same cursor arrow
  geometry, same blue click ring, same shadow.

  Filled at render time by render-external.sh. Placeholders:
    ../TiaScreenshots/Search/longDatablockScrolledTop.png     relative path to the source PNG (FHD or higher); the
                        <image> upscales it to 3840x2160.
<g transform="translate(3500, 440)"><g transform="scale(4) translate(-1, -1)"><path d="M 1,1 L 1,17 L 5,13 L 8,20 L 11,19 L 8,12 L 14,12 Z" fill="white" stroke="black" stroke-width="1.0" stroke-linejoin="round" filter="url(#cursorShadow)"/></g></g>                        sets `noCursor: true` (post-action result frames).
<circle cx="3500" cy="440" r="56" stroke="#1f6feb" stroke-width="8" fill="#1f6feb" fill-opacity="0.2" opacity="0.55" filter="url(#ringShadow)"/>                        or empty when the scene has no click (or noCursor).
<g transform="translate(80, 80)"><rect x="0" y="0" width="1500" height="140" rx="70" fill="#0e2140" fill-opacity="0.92"/><text x="60" y="93" font-family="Segoe UI, Arial, sans-serif" font-size="56" font-weight="700" fill="#ff6464">TIA: no live search &amp; no smart expand</text></g>                        navy backdrop, brick-red text), or empty when the
                        scene has no caption. Painted between source and
                        cursor so the cursor stays on top.

  Cursor arrow path is identical to BulkChangeDialog.xaml — hotspot at
  (1,1) in path coords. Inside scale(4): hotspot translates by (-1,-1)
  so the outer translate places the tip exactly at (CURSOR_X_4K, CURSOR_Y_4K).
  Stroke 1.0 in path coords * scale(4) = 4 px stroke at 4K, matching the
  BlockParam capture's stroke-width after its 2x ScaleTransform + 192-DPI render.
-->
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     viewBox="0 0 3840 2160" width="3840" height="2160">

  <defs>
    <!-- SVG1.1 drop-shadow chain (NOT feDropShadow). Inkscape silently
         drops elements that reference an unsupported filter, so the
         cursor + ring vanish from the rendered PNG. The compose chain
         below works in both Inkscape and modern browsers. -->
    <filter id="ringShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="5"/>
      <feFlood flood-color="#1f6feb" flood-opacity="0.6"/>
      <feComposite in2="SourceAlpha" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="cursorShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="2" dy="2" result="offsetBlur"/>
      <feFlood flood-color="black" flood-opacity="0.55"/>
      <feComposite in2="offsetBlur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <image xlink:href="../TiaScreenshots/Search/longDatablockScrolledTop.png" href="../TiaScreenshots/Search/longDatablockScrolledTop.png"
         x="0" y="0" width="3840" height="2160"
         preserveAspectRatio="xMidYMid slice"/>

<g transform="translate(80, 80)"><rect x="0" y="0" width="1500" height="140" rx="70" fill="#0e2140" fill-opacity="0.92"/><text x="60" y="93" font-family="Segoe UI, Arial, sans-serif" font-size="56" font-weight="700" fill="#ff6464">TIA: no live search &amp; no smart expand</text></g>
<circle cx="3500" cy="440" r="56" stroke="#1f6feb" stroke-width="8" fill="#1f6feb" fill-opacity="0.2" opacity="0.55" filter="url(#ringShadow)"/>
<g transform="translate(3500, 440)"><g transform="scale(4) translate(-1, -1)"><path d="M 1,1 L 1,17 L 5,13 L 8,20 L 11,19 L 8,12 L 14,12 Z" fill="white" stroke="black" stroke-width="1.0" stroke-linejoin="round" filter="url(#cursorShadow)"/></g></g></svg>
